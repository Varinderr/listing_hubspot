version: 2

snapshots:

  - name: ds_listing
    description: >
      dbt snapshot (SCD Type 2) of stg_rental_property__listings. Runs on a
      'check' strategy — dbt compares the current source row against the last
      snapshot row and writes a new version whenever any tracked column changes.

      Tracked columns (changes to these create a new version row):
        listing_name, neighborhood, property_type, room_type, accommodates,
        bathrooms_text, bedrooms, beds, listing_price, host_location,
        host_verifications.

      NOT tracked (present in snapshot but do not trigger a new version):
        number_of_reviews, review_scores_rating, first_review_date,
        last_review_date. These are review aggregates that update frequently
        and would generate excessive version churn if tracked.

      dbt metadata columns added automatically:
        dbt_scd_id — surrogate key for the snapshot row itself
        dbt_updated_at — when dbt last touched this row
        dbt_valid_from — when this version became active
        dbt_valid_to — when this version was superseded (NULL = current)

      Downstream consumer: models/mart/dim_listings.sql — renames dbt metadata
      columns to business-friendly names (valid_from, valid_to, is_current) and
      adds a stable surrogate key.
    columns:
      - name: listing_id
        description: "Natural key. Part of the unique constraint with dbt_valid_from."
        tests:
          - not_null
      - name: dbt_scd_id
        description: "Surrogate key generated by dbt for this snapshot row."
        tests:
          - unique
          - not_null
      - name: dbt_valid_from
        description: "Timestamp when this version of the listing became active."
        tests:
          - not_null
      - name: dbt_valid_to
        description: "Timestamp when this version was superseded. NULL = currently active."
      - name: neighborhood
        description: "Neighborhood at this version. Change triggers a new snapshot row."
      - name: listing_price
        description: "Price at this version. Change triggers a new snapshot row."
