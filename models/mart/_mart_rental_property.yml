version: 2

models:

  - name: fct_listing_daily_details
    description: >
      Core reporting fact table at the listing/day grain.
      Joins calendar, listing attributes (dim_listings, is_current = true),
      and point-in-time amenity snapshots (int_amenities_history SCD2 range join).
      Grain: one row per (listing_id, calendar_date).
    columns:
      - name: fact_id
        description: "Surrogate key: hash of (listing_id, calendar_date)."
        tests:
          - unique
          - not_null
      - name: calendar_date
        description: "The calendar date this row represents."
        tests:
          - not_null
      - name: listing_id
        description: "Foreign key to the listing."
        tests:
          - not_null
      - name: listing_version_id
        description: "Foreign key to dim_listings. Identifies the active listing version."
      - name: listing_name
        description: "Display name of the listing."
      - name: neighborhood
        description: "Neighborhood where the listing is located."
      - name: property_type
        description: "Type of property (e.g. Entire home, Private room)."
      - name: room_type
        description: "Room type descriptor."
      - name: accommodates
        description: "Number of guests this listing can accommodate."
      - name: bedrooms
        description: "Number of bedrooms."
      - name: beds
        description: "Number of beds."
      - name: review_scores_rating
        description: "Average review score at the time of this listing version."
      - name: listed_price
        description: "Owner-set base price from dim_listings. May differ from price_on_day."
      - name: price_on_day
        description: "USD price to rent this listing on calendar_date."
        tests:
          - not_null
      - name: minimum_nights
        description: "Minimum consecutive nights required for a booking on this date."
      - name: maximum_nights
        description: "Maximum consecutive nights allowed for a booking on this date."
      - name: is_available
        description: "True if the listing is available for new bookings on this date."
        tests:
          - not_null
      - name: is_reserved
        description: "True if a reservation exists on this date."
        tests:
          - not_null
      - name: reservation_id
        description: "The reservation ID if reserved; NULL otherwise."
      - name: daily_revenue
        description: "Revenue earned on this date. 0 when not reserved."
        tests:
          - not_null
      - name: is_blocked_by_host
        description: "True when is_available=false AND is_reserved=false. Exclude from occupancy denominator."
        tests:
          - not_null
      - name: amenity_version_id
        description: "Foreign key to int_amenities_history. NULL if no changelog entry covers this date."
      - name: amenities_at_timestamp
        description: "VARIANT array of amenities active on calendar_date. Use array_contains('X'::variant, amenities_at_timestamp) to query."

  - name: dim_listings
    description: >
      SCD Type 2 dimension for listing attributes, sourced from snap_listings.
      Grain: one row per (listing_id, version). is_current = true for the active version.
    columns:
      - name: listing_version_id
        description: "Surrogate key: hash of (listing_id, valid_from)."
        tests:
          - unique
          - not_null
      - name: listing_id
        description: "Natural key for the listing."
        tests:
          - not_null
      - name: valid_from
        description: "Date this version became active."
        tests:
          - not_null
      - name: valid_to
        description: "Date this version was superseded. NULL = currently active."
      - name: is_current
        description: "True if this is the active version of the listing."
        tests:
          - not_null
      - name: listing_name
        description: "Display name at this point in time."
      - name: neighborhood
        description: "Neighborhood at this point in time."
        tests:
          - not_null
      - name: property_type
        description: "Property type at this point in time."
      - name: room_type
        description: "Room type at this point in time."
      - name: accommodates
        description: "Guest capacity at this point in time."
      - name: bathrooms_text
        description: "Bathroom description at this point in time."
      - name: bedrooms
        description: "Bedroom count at this point in time."
      - name: beds
        description: "Bed count at this point in time."
      - name: listing_price
        description: "Listed price at this point in time."
      - name: host_id
        description: "Host who owned this listing during this version."
      - name: host_name
        description: "Host display name during this version."
      - name: host_since_date
        description: "Date the host signed up."
      - name: host_location
        description: "Host location at this point in time."
      - name: host_verifications
        description: "Host verification methods at this point in time."
      - name: number_of_reviews
        description: "Review count at snapshot time. Not tracked for change."
      - name: first_review_date
        description: "Date of first review at snapshot time."
      - name: last_review_date
        description: "Date of most recent review at snapshot time."
      - name: review_scores_rating
        description: "Average review score at snapshot time."
      - name: snapshot_updated_at
        description: "Timestamp when dbt last wrote this row."
        tests:
          - not_null