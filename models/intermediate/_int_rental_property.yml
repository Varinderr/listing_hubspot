version: 2

models:

  - name: int_calendar_enriched
    description: >
      Enriches the staged calendar with derived boolean flags and a daily_revenue measure.
      One row per listing per date. Ephemeral — compiled inline into downstream models.
    columns:
      - name: listing_id
        description: "Foreign key to stg_rental_property__listings."
        tests:
          - not_null
      - name: calendar_date
        description: "Date this row describes."
        tests:
          - not_null
      - name: reservation_id
        description: "NULL when no reservation exists on this date."
      - name: is_available
        description: "True if the property is available for booking on this date."
        tests:
          - not_null
      - name: calendar_price
        description: "USD price for the listing on this date."
        tests:
          - not_null
      - name: minimum_nights
        description: "Minimum consecutive nights required for a booking."
      - name: maximum_nights
        description: "Maximum consecutive nights allowed for a booking."
      - name: is_reserved
        description: "True when reservation_id is not null — i.e. a guest is booked."
        tests:
          - not_null
      - name: daily_revenue
        description: "Revenue earned on this date. Zero when not reserved."
        tests:
          - not_null

  - name: int_amenities_history
    description: >
      SCD Type 2 representation of amenity changes per listing.
      Each row captures the amenities snapshot that was active between valid_from (inclusive)
      and valid_to (exclusive). The current/latest version has valid_to = '9999-12-31'.
      One row per listing per amenity change event.
    columns:
      - name: amenity_version_id
        description: "Surrogate key generated from (listing_id, valid_from)."
        tests:
          - unique
          - not_null
      - name: listing_id
        description: "Foreign key to stg_rental_property__listings."
        tests:
          - not_null
      - name: amenities_snapshot
        description: "JSON VARIANT array of amenities active during [valid_from, valid_to)."
        tests:
          - not_null
      - name: valid_from
        description: "Date this amenity version became active (inclusive)."
        tests:
          - not_null
      - name: valid_to
        description: "Date this amenity version expired (exclusive). '9999-12-31' = still current."
        tests:
          - not_null
